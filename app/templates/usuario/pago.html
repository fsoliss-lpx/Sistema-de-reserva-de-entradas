<!-- app/templates/usuario/pago.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago - UNEMI Conciertos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { min-height: 100vh; background: #0d0e15; color: #e2e8f0; display: flex; justify-content: center; align-items: center; padding: 28px; }
        .payment-card { width: 100%; max-width: 520px; background: #111827; border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; padding: 32px; }
        .payment-card h2 { color: #f8fafc; margin-bottom: 20px; }
        .summary-box { background: #0f172a; border: 1px solid rgba(255,255,255,0.06); border-radius: 22px; padding: 24px; }
        .summary-box h3 { color: #c7d2fe; margin-bottom: 16px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 14px; color: #cbd5e1; }
        .summary-item strong { color: #f8fafc; }
        .total-price { font-size: 26px; font-weight: 800; color: #22c55e; text-align: center; margin-top: 16px; }
        .btn-success, .btn-danger { width: 100%; padding: 14px; border-radius: 16px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; }
        .btn-success { background: #22c55e; color: #0f172a; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-back { display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; color: #a5b4fc; }
    </style>
</head>
<body>
    <div class="payment-card">
        <h2><i class="fa-solid fa-credit-card"></i> Resumen de Compra</h2>
        <div class="summary-box">
            <h3>Reserva #{{ detalle.id_reserva }}</h3>
            <div class="summary-item"><span>Evento</span><strong>{{ detalle.nombre_evento }}</strong></div>
            <div class="summary-item"><span>Asiento</span><strong>{{ detalle.numero_asiento }}</strong></div>
            <div class="summary-item"><span>Expira</span><strong>{{ detalle.timestamp_expiracion.strftime('%H:%M:%S') }}</strong></div>
            <div class="total-price">Total: ${{ '%.2f'|format(detalle.precio_base) }}</div>
        </div>
        <form action="{{ url_for('pagos_api.procesar', id_reserva=detalle.id_reserva) }}" method="POST">
            <button type="submit" name="resultado" value="exito" class="btn-success">Simular Pago Exitoso</button>
            <button type="submit" name="resultado" value="fallo" class="btn-danger">Simular Pago Fallido</button>
        </form>
        <a href="/dashboard" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Volver al Dashboard</a>
    </div>
</body>
</html>
