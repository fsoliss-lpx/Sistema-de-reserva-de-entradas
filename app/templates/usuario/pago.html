<!-- app/templates/usuario/pago.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pasarela de Pago - UNEMI Conciertos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0e15; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        
        .payment-card { background: #1a1a2e; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 450px; text-align: center; }
        .summary-box { background: #2d2d44; padding: 20px; border-radius: 8px; margin: 25px 0; text-align: left; }
        .summary-box h3 { color: #7b2cbf; margin-bottom: 15px; border-bottom: 1px solid #4a4a6a; padding-bottom: 10px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        
        .total-price { font-size: 24px; font-weight: bold; color: #2ecc71; text-align: center; margin-top: 15px; }
        
        .btn-success { background-color: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .btn-success:hover { background-color: #27ae60; }
        
        .btn-danger { background-color: #e74c3c; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-danger:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <div class="payment-card">
        <h2><i class="fa-solid fa-credit-card"></i> Resumen de Compra</h2>
        
        <div class="summary-box">
            <h3>Detalles de la Reserva #{{ detalle.id_reserva }}</h3>
            <div class="summary-item">
                <span>Evento:</span> <strong>{{ detalle.nombre_evento }}</strong>
            </div>
            <div class="summary-item">
                <span>Asiento:</span> <strong>{{ detalle.numero_asiento }}</strong>
            </div>
            <div class="summary-item" style="color: #f1c40f;">
                <span>Expira:</span> <strong>{{ detalle.timestamp_expiracion.strftime('%H:%M:%S') }}</strong>
            </div>
            <div class="total-price">
                Total: ${{ "%.2f"|format(detalle.precio_base) }}
            </div>
        </div>

        <form action="{{ url_for('pagos_api.procesar', id_reserva=detalle.id_reserva) }}" method="POST">
            <input type="hidden" name="monto" value="{{ detalle.precio_base }}">
            <button type="submit" name="resultado" value="exito" class="btn-success">Simular Pago Exitoso</button>
            <button type="submit" name="resultado" value="fallo" class="btn-danger">Simular Pago Fallido</button>
        </form>
    </div>

</body>
</html>
