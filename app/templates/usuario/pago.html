<!-- app/templates/usuario/pago.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago - UNEMI Conciertos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0e15; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .pago-card { background: #1a1a2e; padding: 40px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: bold; margin-bottom: 25px; border-bottom: 1px solid #2d2d44; padding-bottom: 15px; }
        .detalle-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 16px; color: #a0a0b5; }
        .total { font-size: 24px; font-weight: bold; color: #2ecc71; text-align: center; margin: 30px 0; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.3s; color: white; }
        .btn-success { background-color: #2ecc71; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .volver { display: block; text-align: center; color: #a0a0b5; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="pago-card">
        <div class="header">
            <i class="fa-regular fa-credit-card"></i> Resumen de Compra
        </div>

        <div class="detalle-row">
            <span>Reserva #</span>
            <span style="color: white; font-weight: bold;">{{ detalle.id_reserva }}</span>
        </div>
        <div class="detalle-row">
            <span>Evento</span>
            <span style="color: white; font-weight: bold;">{{ detalle.nombre_evento }}</span>
        </div>
        <div class="detalle-row">
            <span>Asiento</span>
            <span style="color: white; font-weight: bold;">{{ detalle.numero_asiento }}</span>
        </div>

        <div class="total">
            Total: ${{ "%.2f"|format(detalle.precio_base) }}
        </div>

        <!-- Formulario corregido que envía el resultado y el monto -->
        <form action="{{ url_for('pagos_api.procesar', id_reserva=detalle.id_reserva) }}" method="POST">
            <input type="hidden" name="monto" value="{{ detalle.precio_base }}">
            
            <!-- Botón de éxito envía 'exito' -->
            <button type="submit" name="resultado" value="exito" class="btn btn-success">
                Simular Pago Exitoso
            </button>
            
            <!-- Botón de fallo envía 'fallo' -->
            <button type="submit" name="resultado" value="fallo" class="btn btn-danger">
                Simular Pago Fallido
            </button>
        </form>

        <a href="/dashboard" class="volver"><i class="fa-solid fa-arrow-left"></i> Cancelar y Volver</a>
    </div>

</body>
</html>
