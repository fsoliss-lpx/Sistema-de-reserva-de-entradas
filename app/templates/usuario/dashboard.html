<!-- app/templates/usuario/dashboard.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - UNEMI Conciertos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estilos base del Dashboard Dark/Purple Mode */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f6f9; min-height: 100vh; }
        
        /* Menú Lateral (Sidebar) oscuro[cite: 2] */
        .sidebar { width: 250px; background-color: #1a1a2e; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 20px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2d2d44; }
        .sidebar-header i { color: #7b2cbf; }
        
        .nav-menu { list-style: none; padding: 20px 0; flex-grow: 1; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #a0a0b5; text-decoration: none; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background-color: #7b2cbf; color: white; border-radius: 0 25px 25px 0; margin-right: 20px; }
        
        /* Contenido Principal */
        .main-content { flex-grow: 1; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .welcome-text h1 { font-size: 28px; color: #333; }
        .welcome-text p { color: #666; margin-top: 5px; }
        
        /* Tarjetas de Resumen */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #7b2cbf; }
        .card h3 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .card p { color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <!-- Menú Lateral[cite: 2] -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-ticket"></i> CONCIERTOS
        </div>
        <ul class="nav-menu">
            <a href="/dashboard" class="nav-item active"><i class="fa-solid fa-house"></i> Inicio</a>
            <a href="#" class="nav-item"><i class="fa-regular fa-calendar"></i> Eventos</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-couch"></i> Mis Reservas</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Historial</a>
            <a href="#" class="nav-item"><i class="fa-regular fa-user"></i> Perfil</a>
        </ul>
        <a href="{{ url_for('auth.logout') }}" class="nav-item" style="margin-bottom: 20px; color: #ff4d4d;">
            <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
        </a>
    </nav>

    <!-- Contenido Principal -->
    <main class="main-content">
        <header class="header">
            <div class="welcome-text">
                <h1>¡Bienvenido, {{ nombre }}! 👋</h1>
                <p>Aquí tienes un resumen de tu actividad.</p>
            </div>
            <div class="user-profile">
                <i class="fa-solid fa-bell" style="font-size: 20px; color: #7b2cbf; margin-right: 15px;"></i>
                <i class="fa-solid fa-circle-user" style="font-size: 32px; color: #333;"></i>
            </div>
        </header>

        <section class="cards-grid">
            <div class="card">
                <h3>0</h3>
                <p>Reservas Activas</p>
            </div>
            <div class="card">
                <h3>0</h3>
                <p>Eventos Asistidos</p>
            </div>
            <div class="card">
                <h3>$0.00</h3>
                <p>Total Gastado</p>
            </div>
        </section>
        
        <!-- Aquí irán los próximos eventos del Sprint 3 -->
    </main>

</body>
</html>
