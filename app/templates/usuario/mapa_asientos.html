<!-- app/templates/usuario/mapa_asientos.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Asientos - UNEMI Conciertos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0d0e15; color: #e2e8f0; display: flex; justify-content: center; padding: 28px; }
        .map-container { width: 100%; max-width: 900px; background: #111827; border-radius: 28px; border: 1px solid rgba(255,255,255,0.06); padding: 32px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .btn-back { display: inline-flex; align-items: center; gap: 10px; color: #a5b4fc; }
        .btn-back:hover { color: #f8fafc; }
        .header h2 { color: #f8fafc; font-size: 28px; }
        .escenario { background: #0f172a; padding: 18px 20px; border-radius: 24px; text-align: center; color: #c7d2fe; letter-spacing: 4px; margin-bottom: 32px; }
        .asientos-grid { display: grid; grid-template-columns: repeat({{ cols }}, minmax(0, 1fr)); gap: 14px; justify-items: center; }
        .asiento { width: 100%; padding: 14px 0; border-radius: 16px; font-weight: 700; text-align: center; cursor: pointer; transition: transform .2s, box-shadow .2s; }
        .asiento:hover { transform: translateY(-1px); }
        .DISPONIBLE { background: #22c55e; color: white; box-shadow: 0 10px 25px rgba(34,197,94,0.18); }
        .RESERVADO_TEMPORAL { background: #f97316; color: white; cursor: not-allowed; }
        .VENDIDO { background: #ef4444; color: white; cursor: not-allowed; }
        .leyenda { display: flex; justify-content: center; gap: 24px; margin-top: 30px; flex-wrap: wrap; }
        .leyenda-item { display: flex; align-items: center; gap: 10px; color: #cbd5e1; }
        .box { width: 16px; height: 16px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="map-container">
        <div class="header">
            <a href="/dashboard" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Volver a Eventos</a>
            <h2>Selecciona tu Asiento</h2>
        </div>
        <div class="escenario">ESCENARIO</div>
        <div class="asientos-grid" style="grid-template-columns: repeat({{ cols }}, minmax(0, 1fr));">
            {% for asiento in asientos %}
            <div class="asiento {{ asiento.estado }}" onclick="seleccionarAsiento('{{ asiento.id_asiento }}', '{{ asiento.numero_asiento }}', '{{ asiento.estado }}')">{{ asiento.numero_asiento }}</div>
            {% endfor %}
        </div>
        <div class="leyenda">
            <div class="leyenda-item"><span class="box" style="background: #22c55e;"></span> Disponible</div>
            <div class="leyenda-item"><span class="box" style="background: #f97316;"></span> En Proceso</div>
            <div class="leyenda-item"><span class="box" style="background: #ef4444;"></span> Ocupado</div>
        </div>
    </div>
    <script>
        function seleccionarAsiento(id, numero, estado) {
            if (estado !== 'DISPONIBLE') {
                alert('Este asiento ya no está disponible.');
                return;
            }
            if (confirm('¿Deseas intentar reservar el asiento ' + numero + '?')) {
                fetch('/api/reservar/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id_asiento: id }) })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            window.location.href = '/pago/' + data.id_reserva;
                        } else {
                            alert('Error: ' + data.message);
                            window.location.reload();
                        }
                    })
                    .catch(error => {
                        console.error('Error en la solicitud:', error);
                        alert('Ocurrió un error de conexión al intentar reservar.');
                    });
            }
        }
    </script>
</body>
</html>
