<!-- app/templates/usuario/mapa_asientos.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Asientos - UNEMI Conciertos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0e15; display: flex; justify-content: center; padding: 40px; }
        
        .map-container { background: #1a1a2e; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 800px; text-align: center; color: white; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-back { text-decoration: none; color: #a0a0b5; font-weight: bold; }
        .btn-back:hover { color: #7b2cbf; }

        .escenario { background-color: #0d0e15; color: #fff; padding: 15px; border-radius: 0 0 50% 50%; margin-bottom: 50px; font-weight: bold; letter-spacing: 5px; border: 1px solid #2d2d44; }

        /* Cuadrícula corregida a 4 columnas */
        .asientos-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            max-width: 500px; 
            margin: 0 auto; 
        }
        
        .asiento { padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; border: 2px solid transparent; color: white; }
        
        /* Colores exactos del diseño */
        .DISPONIBLE { background-color: #2ecc71; }
        .DISPONIBLE:hover { background-color: #27ae60; transform: scale(1.05); }
        
        .RESERVADO_TEMPORAL { background-color: #f39c12; cursor: not-allowed; opacity: 0.8; }
        .VENDIDO { background-color: #e74c3c; cursor: not-allowed; opacity: 0.8; }

        .leyenda { display: flex; justify-content: center; gap: 20px; margin-top: 40px; font-size: 14px; }
        .leyenda-item { display: flex; align-items: center; gap: 8px; }
        .box { width: 20px; height: 20px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="map-container">
        <div class="header">
            <a href="/dashboard" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Volver a Eventos</a>
            <h2>Selecciona tu Asiento</h2>
        </div>

        <div class="escenario">ESCENARIO</div>

        <div class="asientos-grid">
            {% for asiento in asientos %}
                <div class="asiento {{ asiento.estado }}" 
                     onclick="seleccionarAsiento('{{ asiento.id_asiento }}', '{{ asiento.numero_asiento }}', '{{ asiento.estado }}')">
                    {{ asiento.numero_asiento }}
                </div>
            {% endfor %}
        </div>

        <div class="leyenda">
            <div class="leyenda-item"><div class="box" style="background: #2ecc71;"></div> Disponible</div>
            <div class="leyenda-item"><div class="box" style="background: #f39c12;"></div> En Proceso</div>
            <div class="leyenda-item"><div class="box" style="background: #e74c3c;"></div> Ocupado</div>
        </div>
    </div>

    <script>
        function seleccionarAsiento(id, numero, estado) {
            if (estado !== 'DISPONIBLE') {
                alert('Este asiento ya no está disponible.');
                return;
            }
            
            if (confirm('¿Deseas intentar reservar el asiento ' + numero + '? Tendrás 10 minutos para pagar.')) {
                // Hacemos la petición POST a la API que creó tu compañero
                fetch('/api/reservar/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id_asiento: id })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // El Control Optimista funcionó y ganamos el asiento
                        alert(data.message);
                        
                        // Redirigir al usuario a la pantalla de pago (Ruta temporal)
                        window.location.href = `/pagos/simulador/${data.id_reserva}`; 
                    } else {
                        // Alguien más ganó la condición de carrera
                        alert(data.message);
                        location.reload(); // Recargar para mostrar el asiento en rojo/naranja
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Hubo un error interno al conectar con el servidor.');
                });
            }
        }
