<!-- app/templates/auth/login.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - UNEMI Conciertos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <!-- Importar iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <i class="fa-solid fa-ticket"></i> CONCIERTOS
        </div>
        
        <h2 class="auth-title">Inicia sesión en tu cuenta</h2>

        <!-- Bloque para mostrar errores de Flask (Flash messages) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group input-icon-wrapper">
                <i class="fa-regular fa-user input-icon"></i>
                <input type="email" name="correo" class="form-control" placeholder="Correo electrónico" required>
            </div>
            
            <div class="form-group input-icon-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="contrasena" class="form-control" placeholder="Contraseña" required>
            </div>

            <button type="submit" class="btn-primary">Iniciar sesión</button>
        </form>

        <div class="auth-links">
            ¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate</a>
        </div>
    </div>

</body>
</html>
