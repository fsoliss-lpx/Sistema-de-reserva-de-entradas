<!-- app/templates/auth/registro.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate - CONCIERTOS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-box">
                    <i class="fa-solid fa-ticket"></i>
                </div>
                <div>
                    <h1>CONCIERTOS</h1>
                    <p>Sistema de reserva de entradas</p>
                </div>
            </div>

            <h2 class="auth-title">Crea tu cuenta</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.register') }}" method="POST" class="auth-form">
                <div class="form-group input-icon-wrapper">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" name="nombre" class="form-control" placeholder="Nombre completo" required>
                </div>

                <div class="form-group input-icon-wrapper">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" name="correo" class="form-control" placeholder="Correo electrónico" required>
                </div>

                <div class="form-group input-icon-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="contrasena" class="form-control" placeholder="Contraseña" required>
                </div>

                <div class="form-group input-icon-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="confirmar_contrasena" class="form-control" placeholder="Confirmar contraseña" required>
                </div>

                <label class="checkbox-label checkbox-full">
                    <input type="checkbox" name="terminos" required>
                    Acepto los términos y condiciones
                </label>

                <button type="submit" class="btn-primary btn-full">Registrarme</button>
            </form>

            <div class="auth-footer">
                ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
            </div>
            <div class="auth-image-credit">Fondo: concierto-1.png</div>
        </div>
    </div>
</body>
</html>
