<!-- app/templates/admin/asiento_form.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Editar Asiento' if asiento else 'Nuevo Asiento' }} - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: #0d0e15; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        a { color: inherit; text-decoration: none; }
        .layout { display: flex; gap: 24px; max-width: 1400px; margin: 0 auto; padding: 28px 20px 40px; }
        .sidebar { width: 280px; background: #111827; border-radius: 28px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; }
        .brand i { color: #8b5cf6; }
        .section-title { margin-top: 32px; margin-bottom: 12px; color: #94a3b8; font-size: 11px; letter-spacing: .25em; text-transform: uppercase; }
        .menu-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 16px; color: #cbd5e1; transition: background .2s ease; }
        .menu-link:hover, .menu-link.active { background: rgba(255,255,255,0.06); color: #f8fafc; }
        .sidebar-footer a { display: inline-flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 16px; background: rgba(248,113,113,0.14); color: #fecaca; }
        .main { flex: 1; display: flex; flex-direction: column; gap: 24px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .page-header h1 { font-size: 32px; color: #f8fafc; }
        .page-header p { color: #94a3b8; line-height: 1.75; }
        .secondary-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(167,139,250,0.15); color: #c4b5fd; padding: 12px 18px; border-radius: 16px; font-weight: 700; }
        .form-container { background: #111827; border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; padding: 30px; max-width: 700px; }
        .form-group { margin-bottom: 18px; display: grid; gap: 10px; }
        label { color: #94a3b8; font-size: 14px; }
        input, select { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: #0f172a; color: #e2e8f0; }
        button { background: #7c3aed; color: #fff; padding: 14px 18px; border: none; border-radius: 18px; font-weight: 700; cursor: pointer; }
        .btn-back { display: inline-flex; align-items: center; gap: 10px; color: #a78bfa; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div>
                <div class="brand"><i class="fa-solid fa-shield-halved"></i> Administrador</div>
                <div class="section-title">Panel</div>
                <a href="{{ url_for('admin.dashboard_admin') }}" class="menu-link"><i class="fa-solid fa-chart-line"></i> Inicio</a>
                <div class="section-title">Gestión</div>
                <a href="{{ url_for('admin_eventos.gestion_eventos') }}" class="menu-link"><i class="fa-solid fa-microphone"></i> Eventos</a>
                <a href="{{ url_for('admin_asientos.gestion_asientos') }}" class="menu-link active"><i class="fa-solid fa-chair"></i> Asientos</a>
                <a href="{{ url_for('admin_usuarios.gestion_usuarios') }}" class="menu-link"><i class="fa-solid fa-users"></i> Usuarios</a>
            </div>
            <div class="sidebar-footer">
                <a href="{{ url_for('auth.logout') }}"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
            </div>
        </aside>

        <main class="main">
            <div class="page-header">
                <div>
                    <h1>{{ 'Editar Asiento' if asiento else 'Nuevo Asiento' }}</h1>
                    <p>Define el número y estado del asiento manteniendo el mismo estilo administrativo en tu panel.</p>
                </div>
                <a href="/dashboard" class="secondary-btn"><i class="fa-solid fa-arrow-left"></i> Ver sitio usuario</a>
            </div>

            <div class="form-container">
                <form action="{{ url_for('admin_asientos.guardar_asiento', id_asiento=asiento.id_asiento if asiento else None) }}" method="POST">
                    <div class="form-group">
                        <label>Evento</label>
                        <select name="id_evento" required>
                            {% for evento in eventos %}
                                <option value="{{ evento.id_evento }}" {% if asiento and asiento.id_evento == evento.id_evento %}selected{% endif %}>{{ evento.nombre_evento }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Número de asiento</label>
                        <input type="text" name="numero_asiento" value="{{ asiento.numero_asiento if asiento else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select name="estado" required>
                            <option value="DISPONIBLE" {% if asiento and asiento.estado == 'DISPONIBLE' %}selected{% endif %}>DISPONIBLE</option>
                            <option value="RESERVADO_TEMPORAL" {% if asiento and asiento.estado == 'RESERVADO_TEMPORAL' %}selected{% endif %}>RESERVADO_TEMPORAL</option>
                            <option value="VENDIDO" {% if asiento and asiento.estado == 'VENDIDO' %}selected{% endif %}>VENDIDO</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Versión</label>
                        <input type="number" name="version" value="{{ asiento.version if asiento else '1' }}" min="1" required>
                    </div>
                    <button type="submit">Guardar Asiento</button>
                </form>
                <a href="{{ url_for('admin_asientos.gestion_asientos') }}" class="btn-back">← Volver a Asientos</a>
            </div>
        </main>
    </div>
</body>
</html>
